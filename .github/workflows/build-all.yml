name: Test All Builds

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      lineage_base_boot_url:
        description: 'Direct HTTPS URL to the exact LineageOS boot.img. Leave empty to skip a LineageOS boot.img artifact.'
        required: false
        type: string
        default: ''
      lineage_base_boot_sha256:
        description: 'SHA-256 for lineage_base_boot_url.'
        required: false
        type: string
        default: ''
      nothingoss_base_boot_url:
        description: 'Direct HTTPS URL to the exact NothingOS boot.img. Leave empty to skip a NothingOS boot.img artifact.'
        required: false
        type: string
        default: ''
      nothingoss_base_boot_sha256:
        description: 'SHA-256 for nothingoss_base_boot_url.'
        required: false
        type: string
        default: ''

jobs:
  build-default:
    name: Build (LineageOS)
    uses: ./.github/workflows/build.yml
    with:
      kernel_type: LineageOS
      kpm_support: true
      susfs_support: true
      bbg_support: true
      susfs_force: false
      base_boot_url: ${{ inputs.lineage_base_boot_url }}
      base_boot_sha256: ${{ inputs.lineage_base_boot_sha256 }}

  build-nothingoss:
    name: Build (NothingOSS)
    uses: ./.github/workflows/build.yml
    with:
      kernel_type: NothingOSS
      kernel_repo: https://github.com/NothingOSS/android_kernel_msm-5.10_nothing_sm8475.git
      kernel_branch: sm8475/b/mr
      kernel_defconfig: gki_defconfig
      extra_configs: vendor/waipio_GKI.config
      susfs_branch: gki-android13-5.10
      kpm_support: true
      susfs_support: true
      susfs_force: false
      bbg_support: true
      base_boot_url: ${{ inputs.nothingoss_base_boot_url }}
      base_boot_sha256: ${{ inputs.nothingoss_base_boot_sha256 }}

